<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculadora web">
    <meta name="author" content="Sergio Sánchez Martín">
    <title>Calculadora</title>
    <link rel="shortcut icon" href="./imagenes/calculator-icon-windows-v1.ico" type="image/x-icon">
    <link rel="stylesheet" href="./estilos.css">
</head>
<body>

    <header>
        <h1 class="titulo-calculadora">Calculadora</h1>
    </header>

    <main>
        <div class="contenedor-calculadora">
            <div id="pantalla" class="pantalla color-normal">0</div>
            <div class="contenedor-botonera">
                <!-- 1ª fila -->
                <button class="boton control doble" id="borrar-entrada">CE</button>
                <button class="boton control" id="borrar-todo">C</button>
                <button class="boton control" id="retroceso">⌫</button>

                <!-- 2ª fila -->
                <button class="boton inmediata" id="inversa"></button>
                <button class="boton inmediata" id="cuadrado"></button>
                <button class="boton inmediata" id="raiz"></button>
                <button class="boton operacion" id="dividir">/</button>

                <!-- 3ª fila -->
                <button class="boton numero">7</button>
                <button class="boton numero">8</button>
                <button class="boton numero">9</button>
                <button class="boton operacion" id="multiplicar">x</button>

                <!-- 3ª fila -->
                <button class="boton numero">4</button>
                <button class="boton numero">5</button>
                <button class="boton numero">6</button>
                <button class="boton operacion" id="restar">-</button>

                <!-- 4ª fila -->
                <button class="boton numero">1</button>
                <button class="boton numero">2</button>
                <button class="boton numero">3</button>
                <button class="boton operacion" id="sumar">+</button>

                <!-- 5ª fila -->
                <button class="boton numero doble">0</button>
                <button class="boton punto" id="punto">.</button>
                <button class="boton igual" id="igual">=</button>
            </div>
        </div>
    </main>

    <footer>
        <p class="descripcion">Ejercicio 02 UD 03 - Lenguajes de marcas y sistemas de gestión de información.</p>
        <p class="autor"><u>Proyecto realizado por</u>: 👉 ISMAEL PARRA MOUSSAIF 👈 (Declaro que no he usado IA en el proyecto)</p>
    </footer>
    <script src="js/javascript.js"></script>
</body>
</html>
